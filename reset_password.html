    <a href="lists.html">Lists</a>
    <a href="journal.html">Journal</a>

    <div class="header-search">
      <button type="button" id="headerSearchToggle" class="header-search-btn" aria-label="Open search">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.8 5.2a5.6 5.6 0 1 1 0 11.2a5.6 5.6 0 0 1 0-11.2Zm0-1.7a7.3 7.3 0 1 0 4.55 13.02l3.56 3.56a.9.9 0 0 0 1.27-1.27l-3.56-3.56A7.3 7.3 0 0 0 10.8 3.5Z" />

<main>
  <section class="page-header">
    <h1>Reset Password</h1>
    <p>Create a new password for your CineByte account.</p>
  </section>

  <section class="content-section auth-single-layout">
    <form class="box auth-card" method="POST" action="reset_password.php">
      <h2>New Password</h2>

      <label>New Password</label>
      <input type="password" name="new_password" minlength="6" required />

      <label>Confirm New Password</label>
      <input type="password" name="confirm_password" minlength="6" required />

      <button class="btn" type="submit">Reset Password</button>
    </form>
  </section>
</main>

<footer>
  <p>&copy; 2026 CineByte</p>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const error = params.get("error");

  if (error === "mismatch") {
    alert("Passwords do not match.");
  }

  if (error === "short") {
    alert("Password must be at least 6 characters.");
  }

  if (error === "expired") {
    alert("Reset session expired. Please enter your email again.");
  }
</script>

<script src="script.js"></script>
</body>
