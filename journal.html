<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineByte | Journal</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="site-header">
    <a href="index.html" class="logo">CineByte</a>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <nav id="mainNav">
      <a href="index.html">Home</a>
      <a href="films.html">Films / Videos</a>
      <a href="lists.html">Lists</a>
      <a href="journal.php">Journal</a>
      <a href="profile.html">Profile</a>

      <div class="header-search">
      <button type="button" id="headerSearchToggle" class="header-search-btn" aria-label="Open search">
        <svg
          class="search-icon"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path
            d="M10.8 5.2a5.6 5.6 0 1 1 0 11.2a5.6 5.6 0 0 1 0-11.2Zm0-1.7a7.3 7.3 0 1 0 4.55 13.02l3.56 3.56a.9.9 0 0 0 1.27-1.27l-3.56-3.56A7.3 7.3 0 0 0 10.8 3.5Z"
          />
        </svg>
      </button>

      <div id="headerSearchBox" class="header-search-box">
        <input
          type="text"
          id="headerSearchInput"
          placeholder="Search films..."
          autocomplete="off"
        />

        <div id="headerSearchResults" class="header-search-results"></div>
      </div>
    </div>

      <a href="auth.html" id="authNav">Login</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Journal</h1>
      <p>Record what you watched and write your personal viewing notes.</p>
    </section>

    <section class="content-section journal-layout">
      <form class="box" onsubmit="saveJournal(event)">
        <h2>Add Journal</h2>

        <label>Select Movie</label>
        <select id="journalMovie" required>
          <option value="Interstellar">Interstellar</option>
          <option value="Oppenheimer">Oppenheimer</option>
          <option value="The Batman">The Batman</option>
          <option value="Dune">Dune</option>
        </select>

        <label>Rating</label>
        <select id="journalRating">
          <option>★★★★★</option>
          <option>★★★★☆</option>
          <option>★★★☆☆</option>
          <option>★★☆☆☆</option>
          <option>★☆☆☆☆</option>
        </select>

        <label>Review</label>
        <textarea id="journalReview" rows="6" required></textarea>

        <button class="btn" type="submit">Save Journal</button>
      </form>

      <div class="box">
        <h2>Added Journal</h2>
        <div id="journalList"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 CineByte. Web Design Project.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
