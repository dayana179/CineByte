<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineByte | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<header class="site-header">
  <a href="index.html" class="logo">CineByte</a>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <nav id="mainNav">
    <a href="index.html">Home</a>
    <a href="films.html">Films</a>
     <a href="videos.php">Videos</a>
    <a href="lists.html">Lists</a>
    <a href="profile.php">Profile</a>

    <div class="header-search">
      <button type="button" id="headerSearchToggle" class="header-search-btn" aria-label="Open search">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M10.8 5.2a5.6 5.6 0 1 1 0 11.2a5.6 5.6 0 0 1 0-11.2Zm0-1.7a7.3 7.3 0 1 0 4.55 13.02l3.56 3.56a.9.9 0 0 0 1.27-1.27l-3.56-3.56A7.3 7.3 0 0 0 10.8 3.5Z" />
        </svg>
      </button>

      <div id="headerSearchBox" class="header-search-box">
        <input type="text" id="headerSearchInput" placeholder="Search films..." autocomplete="off" />
        <div id="headerSearchResults" class="header-search-results"></div>
      </div>
    </div>

    <a href="login.html" id="authNav">Login</a>
  </nav>
</header>

<main>
  <section class="page-header">
    <h1>Login</h1>
    <p>Access your CineByte account to manage your profile, lists, and journal.</p>
  </section>

  <section class="content-section auth-single-layout">
    <form class="box auth-card" method="POST" action="login.php">
      <h2>Welcome Back</h2>

      <label>Email</label>
      <input type="email" name="email" required />

      <label>Password</label>
      <input type="password" name="password" required />

      <a class="forgot-password-link" href="forgot_password.html">Forgot password?</a>

      <br>

      <button class="btn" type="submit">Login</button>

      <p class="auth-switch">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
      </p>
    </form>
  </section>
</main>

<footer>
  <p>&copy; 2026 CineByte</p>
</footer>

  <div id="journalSearchModal" class="journal-modal">
    <div class="journal-modal-box">
      <div class="journal-modal-header">
        <h2>Add to your journal...</h2>
        <button id="journalModalClose" class="journal-modal-close" type="button">×</button>
      </div>

      <div class="journal-modal-body">
        <input
          type="text"
          id="journalSearchInput"
          placeholder="Search for film..."
          autocomplete="off"
        />

        <div id="journalSearchResults" class="journal-modal-results"></div>
      </div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const error = params.get("error");
  const reset = params.get("reset");

  if (error === "password") {
    alert("Incorrect password. Please try again.");
  }

  if (error === "notfound") {
    alert("No account found with this email.");
  }

  if (reset === "success") {
    alert("Password reset successful. Please login with your new password.");
  }
</script>

<script src="script.js"></script>
</body>
</html>
