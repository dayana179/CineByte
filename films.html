<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineByte | Films</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="site-header">
  <a href="index.html" class="logo">CineByte</a>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <nav id="mainNav">
    <a href="index.html">Home</a>
    <a href="films.html">Films</a>
    <a href="videos.php">Videos</a>
    <a href="lists.html">Lists</a>
    <a href="profile.php">Profile</a>

    <div class="header-search">
    <button type="button" id="headerSearchToggle" class="header-search-btn" aria-label="Open search">
      <svg
        class="search-icon"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          d="M10.8 5.2a5.6 5.6 0 1 1 0 11.2a5.6 5.6 0 0 1 0-11.2Zm0-1.7a7.3 7.3 0 1 0 4.55 13.02l3.56 3.56a.9.9 0 0 0 1.27-1.27l-3.56-3.56A7.3 7.3 0 0 0 10.8 3.5Z"
        />
      </svg>
    </button>

      <div id="headerSearchBox" class="header-search-box">
        <input
          type="text"
          id="headerSearchInput"
          placeholder="Search films..."
          autocomplete="off"
        />

        <div id="headerSearchResults" class="header-search-results"></div>
      </div>
    </div>
    
    <a href="login.html" id="authNav">Login</a>
  </nav>
</header>

<main>
   <section class="page-header films-page-header">
  <p class="tagline">CineByte Films</p>
  <h1>Browse Films</h1>
  <p>
    Search, filter, and discover films from the TMDB movie database.
  </p>
</section>

<section class="content-section film-browser-section">
  <div class="film-browser-top">
    <div>
      <h2 id="filmPageTitle">Popular Films</h2>
      <p id="filmStatus" class="muted-text">Loading films...</p>
    </div>

    <form id="filmSearchForm" class="film-main-search">
      <input
        type="text"
        id="filmSearchInput"
        placeholder="Search by film title..."
        autocomplete="off"
      />
      <button type="submit" class="btn">Search</button>
    </form>
  </div>

  <div class="film-toolbar">
    <div class="filter-group">
      <label for="filmSort">Sort by</label>
      <select id="filmSort">
        <option value="popularity.desc">Popularity</option>
        <option value="vote_average.desc">Highest Rated</option>
        <option value="primary_release_date.desc">Newest First</option>
        <option value="primary_release_date.asc">Oldest First</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filmGenre">Genre</label>
      <select id="filmGenre">
        <option value="">All Genres</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filmYear">Year</label>
      <input
        type="number"
        id="filmYear"
        placeholder="e.g. 2024"
        min="1900"
        max="2030"
      />
    </div>

    <button type="button" id="clearFilmFilters" class="btn btn-secondary">
      Clear
    </button>
  </div>

  <div id="filmContainer" class="poster-grid">
    <!-- Film cards load here -->
  </div>

  <div class="load-more-wrap">
    <button id="loadMoreBtn" class="btn btn-secondary" type="button">
      Load More
    </button>
  </div>
</section>
</main>

<footer>
  
  <p>&copy; 2026 CineByte</p>
</footer>
<div id="journalSearchModal" class="journal-modal">
  <div class="journal-modal-box">
    <div class="journal-modal-header">
      <h2>Add to your journal...</h2>
      <button id="journalModalClose" class="journal-modal-close" type="button">×</button>
    </div>

    <div class="journal-modal-body">
      <input
        type="text"
        id="journalSearchInput"
        placeholder="Search for film..."
        autocomplete="off"
      />

      <div id="journalSearchResults" class="journal-modal-results"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
