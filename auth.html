<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineByte | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="site-header">
    <a href="index.html" class="logo">CineByte</a>
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>

    <nav id="mainNav">
      <a href="index.html">Home</a>
      <a href="films.html">Films / Videos</a>
      <a href="lists.html">Lists</a>
      <a href="journal.html">Journal</a>
      <a href="profile.html">Profile</a>
      <a href="auth.html" id="authNav">Login</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>Account</h1>
      <p>Login or create an account to access personalised watchlists, journals, and lists.</p>
    </section>

    <section class="content-section auth-layout">
      <form class="box" onsubmit="signup(event)">
        <h2>Sign Up</h2>

        <label>Username</label>
        <input type="text" id="signupUsername" required>

        <label>Email</label>
        <input type="email" id="signupEmail" required>

        <label>Password</label>
        <input type="password" id="signupPassword" required>

        <button class="btn" type="submit">Create Account</button>
      </form>

      <form class="box" onsubmit="login(event)">
        <h2>Login</h2>

        <label>Email</label>
        <input type="email" id="loginEmail" required>

        <label>Password</label>
        <input type="password" id="loginPassword" required>

        <button class="btn" type="submit">Login</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 CineByte. Web Design Project.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
