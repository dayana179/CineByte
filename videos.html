<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineByte | YouTube Videos</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="site-header">
  <a href="index.html" class="logo">CineByte</a>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <nav id="mainNav">
    <a href="index.html">Home</a>
    <a href="films.html">Films</a>
     <a href="videos.html">Videos</a>
    <a href="lists.html">Lists</a>
    <a href="profile.php">Profile</a>

    <div class="header-search">
    <button type="button" id="headerSearchToggle" class="header-search-btn" aria-label="Open search">
      <svg
        class="search-icon"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <path
          d="M10.8 5.2a5.6 5.6 0 1 1 0 11.2a5.6 5.6 0 0 1 0-11.2Zm0-1.7a7.3 7.3 0 1 0 4.55 13.02l3.56 3.56a.9.9 0 0 0 1.27-1.27l-3.56-3.56A7.3 7.3 0 0 0 10.8 3.5Z"
        />
      </svg>
    </button>

      <div id="headerSearchBox" class="header-search-box">
        <input
          type="text"
          id="headerSearchInput"
          placeholder="Search films..."
          autocomplete="off"
        />

        <div id="headerSearchResults" class="header-search-results"></div>
      </div>
    </div>
    
    <a href="login.html" id="authNav">Login</a>
  </nav>
</header>

  <main>
    <section class="page-header">
      <h1>YouTube Videos</h1>
      <p>Paste a YouTube link to preview, track, and review videos.</p>
    </section>

    <section class="content-section">
      <h2>Track YouTube Video</h2>

      <form class="box youtube-form" onsubmit="trackYouTubeVideo(event)">
        <label for="youtubeUrl">YouTube URL</label>
        <input
          type="url"
          id="youtubeUrl"
          placeholder="Paste YouTube URL"
          required
        />

        <label for="youtubeTitle">Video title / note</label>
        <input
          type="text"
          id="youtubeTitle"
          placeholder="Example: Movie review, trailer, essay video"
        />

        <button class="btn" type="submit">Track Video</button>
        <p id="youtubeMessage" class="form-message"></p>
      </form>

      <div id="youtubePlayer" class="video-box youtube-player">
        <p style="color:#aaa;padding:25px;">Paste a YouTube URL above to preview it here.</p>
      </div>

      <div class="section-heading-row">
        <h2>Tracked YouTube Videos</h2>
        <span id="youtubeCount">0 videos tracked</span>
      </div>

      <div id="youtubeVideoList"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 CineByte. Web Design Project.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
